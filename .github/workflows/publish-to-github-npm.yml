name: Publish to PUBLIC NPM Package Registry
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    if: github.repository == 'pbv-public/partner-sdk-nodejs'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@pbvision'
      - name: Publish
        run: |
          before=${{ github.event.before }}
          after=${{ github.event.after }}
          echo from ${before} to ${after}
          zero='0000000000000000000000000000000000000000'
          if [ "$before" = "$zero" ]; then
            changed=1
          else
            git diff ${before} ${after} -- package.json | fgrep '"version": "' && changed=1 || changed=0
          fi
          if [ "$changed" = "1" ]; then
            pkg=$(node -p "require('./package.json').name")
            ver=$(node -p "require('./package.json').version")
            if curl -fsS "https://registry.npmjs.org/${pkg}/${ver}" >/dev/null 2>&1; then
              echo "${pkg}@${ver} already on npmjs, skipping publish"
            else
              npm publish --access public
            fi
          else
            echo 'version was not changed; nothing to publish'
          fi
        shell: bash
